<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS Dynamic Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .currency-prefix {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 16px 16px 48px;
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            letter-spacing: 0.5px;
        }

        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.2);
            font-weight: 400;
        }

        input[type="text"]:focus {
            border-color: #00c6ff;
            background: rgba(0,198,255,0.07);
        }

        .formatted-amount {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: -14px;
            margin-bottom: 20px;
            padding-left: 4px;
            min-height: 18px;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn-generate:hover {
            opacity: 0.9;
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(255, 80, 80, 0.12);
            border: 1px solid rgba(255, 80, 80, 0.3);
            color: #ff7070;
            font-size: 13px;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 16px;
            display: none;
        }

        .result-section {
            margin-top: 28px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 24px;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .qr-frame {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .qr-frame img {
            display: block;
            width: 200px;
            height: 200px;
            border-radius: 4px;
        }

        .amount-badge {
            text-align: center;
            margin-bottom: 20px;
        }

        .amount-badge .label-text {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }

        .amount-badge .amount-value {
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .btn-download {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            color: #00c6ff;
            background: rgba(0,198,255,0.1);
            border: 1.5px solid rgba(0,198,255,0.3);
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download:hover {
            background: rgba(0,198,255,0.18);
            border-color: rgba(0,198,255,0.5);
        }
            .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-row">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3h7v7H3V3zm1 1v5h5V4H4zm1 1h3v3H5V5zM14 3h7v7h-7V3zm1 1v5h5V4h-5zm1 1h3v3h-3V5zM3 14h7v7H3v-7zm1 1v5h5v-5H4zm1 1h3v3H5v-3zM17 14h2v2h-2v-2zM14 14h2v2h-2v-2zM14 17h2v2h-2v-2zM17 17h2v2h-2v-2zM20 14h1v7h-7v-1h6v-6z"/>
                </svg>
            </div>
            <h1>QRIS Generator</h1>
        </div>
        <p class="subtitle">Dynamic QRIS untuk pembayaran langsung</p>

        <label for="nominal">Nominal Pembayaran</label>
        <div class="input-wrapper">
            <span class="currency-prefix">Rp</span>
            <input
                type="text"
                id="nominal"
                placeholder="0"
                autocomplete="off"
                inputmode="numeric"
            />
        </div>
        <div class="formatted-amount" id="formattedAmount"></div>

        <button class="btn-generate" id="btnGenerate" onclick="generate()">
            Generate QRIS
        </button>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result-section" id="resultSection">
            <hr class="divider">
            <div class="amount-badge">
                <div class="label-text">Total Pembayaran</div>
                <div class="amount-value" id="displayAmount"></div>
            </div>
            <div class="qr-container">
                <div class="qr-frame">
                    <img id="qrImage" src="" alt="QR Code">
                </div>
            </div>
            <button class="btn-download" onclick="downloadQR()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Unduh QR Code
            </button>
        </div>
    </div>

    <script>
        const nominalInput = document.getElementById('nominal');
        const formattedAmount = document.getElementById('formattedAmount');

        nominalInput.addEventListener('input', function () {
            let raw = this.value.replace(/\D/g, '');
            this.value = raw;
            if (raw) {
                formattedAmount.textContent = 'Rp ' + parseInt(raw).toLocaleString('id-ID');
            } else {
                formattedAmount.textContent = '';
            }
        });

        nominalInput.addEventListener('keydown', function (e) {
                      if (e.key === 'Enter') generate();
        });

        function formatRupiah(num) {
            return 'Rp ' + parseInt(num).toLocaleString('id-ID');
        }

        async function generate() {
            const nominal = nominalInput.value.trim();
            const btn = document.getElementById('btnGenerate');
            const errorMsg = document.getElementById('errorMsg');
            const resultSection = document.getElementById('resultSection');

            errorMsg.style.display = 'none';
            resultSection.style.display = 'none';

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Memproses...';

            try {
                const res = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nominal })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || 'Terjadi kesalahan';
                    errorMsg.style.display = 'block';
                    return;
                }

                document.getElementById('qrImage').src = 'data:image/png;base64,' + data.image;
                document.getElementById('displayAmount').textContent = formatRupiah(nominal);
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            } catch (err) {
                errorMsg.textContent = 'Gagal terhubung ke server';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Generate QRIS';
            }
        }

        async function downloadQR() {
            const nominal = nominalInput.value.trim();

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nominal })
                });

                if (!res.ok) return;
                                      
                  const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `QRIS_${nominal}.png`;
                a.click();
                URL.revokeObjectURL(url);

            } catch (err) {
                alert('aduh lekk, gagal generate');
            }
        }
    </script>
</body>
</html>
